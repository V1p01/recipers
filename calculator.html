<body>

        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🍳</span>
                <span class="logo-text">Кулинария студента</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Главная</a></li>
                <li><a href="recipes.html" class="nav-link">Рецепты</a></li>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

    <div class="breadcrumbs">
        <a href="index.html">Главная</a> → Калькулятор
    </div>

    <section style="padding-top: 2rem;">
        <h2 class="section-title">Калькулятор стоимости</h2>
        <div class="calculator-container">
            <div class="form-group">
                <label>Название блюда</label>
                <input type="text" id="dishName" placeholder="Например: Паста с тунцом">
            </div>
            <h3 style="margin-bottom: 1rem;">Ингредиенты</h3>
            <div id="ingredientsList">
                <div class="ingredient-row">
                    <input type="text" placeholder="Название" class="ing-name">
                    <input type="number" placeholder="Количество (г/мл)" class="ing-amount">
                    <input type="number" placeholder="Цена за ед." class="ing-price">
                    <button class="remove-ingredient" style="background: #FF6B6B; color: white; border: none; padding: 0.5rem; border-radius: 5px; cursor: pointer;">✕</button>
                </div>
            </div>
            <button id="addIngredient" style="background: #4ECDC4; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 25px; cursor: pointer; margin-bottom: 1.5rem; font-weight: 500;">+ Добавить</button>
            <div class="form-group">
                <label>Количество порций</label>
                <input type="number" id="portions" value="1" min="1">
            </div>
            <button onclick="calculate()" class="cta-button" style="width: 100%; justify-content: center;">Рассчитать</button>
            <div id="result" class="hidden">
                <h3 style="text-align: center; margin-top: 2rem;">Результат:</h3>
                <div class="total-price" id="totalPrice">0 ₽</div>
                <p style="text-align: center; color: #666;" id="pricePerPortion"></p>
                <div style="background: #f0f0f0; padding: 1rem; border-radius: 10px; margin-top: 1rem;">
                    <p id="savingTip"></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-info"><h3>Кулинария студента</h3><p>Проект для студентов Якутска.</p></div>
            <div class="footer-links">
                <a href="recipes.html">Рецепты</a><a href="calculator.html">Калькулятор</a><a href="tips.html">Советы</a><a href="about.html">О проекте</a><a href="auth.html">Вход</a>
            </div>
        </div>
        <div class="footer-bottom"><p>© 2024 Кулинария студента | Якутск</p></div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('addIngredient').addEventListener('click', function() {
            const row = document.createElement('div');
            row.className = 'ingredient-row';
            row.innerHTML = `
                <input type="text" placeholder="Название" class="ing-name">
                <input type="number" placeholder="Количество" class="ing-amount">
                <input type="number" placeholder="Цена" class="ing-price">
                <button class="remove-ingredient" style="background: #FF6B6B; color: white; border: none; padding: 0.5rem; border-radius: 5px; cursor: pointer;">✕</button>
            `;
            document.getElementById('ingredientsList').appendChild(row);
            row.querySelector('.remove-ingredient').addEventListener('click', function() { row.remove(); });
        });
        document.querySelector('.remove-ingredient').addEventListener('click', function() {
            if (document.querySelectorAll('.ingredient-row').length > 1) this.parentElement.remove();
        });
        function calculate() {
            let total = 0;
            document.querySelectorAll('.ingredient-row').forEach(row => {
                total += (parseFloat(row.querySelector('.ing-amount').value) || 0) * (parseFloat(row.querySelector('.ing-price').value) || 0);
            });
            const portions = parseInt(document.getElementById('portions').value) || 1;
            const perPortion = total / portions;
            document.getElementById('totalPrice').textContent = total.toFixed(0) + ' ₽';
            document.getElementById('pricePerPortion').textContent = 'Цена за порцию: ' + perPortion.toFixed(0) + ' ₽';
            document.getElementById('savingTip').textContent = perPortion < 150 ? '✅ Отличная цена!' : perPortion < 300 ? '👍 Хорошая цена.' : '💡 Можно сэкономить.';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoE18PySgZcwUSV1zGNU1a4ql9IDxaNGI",
            authDomain: "kulinariastudenta.firebaseapp.com",
            projectId: "kulinariastudenta",
            storageBucket: "kulinariastudenta.firebasestorage.app",
            messagingSenderId: "712553246230",
            appId: "1:712553246230:web:6940e365ae83f678270f37"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged(function(user) {

            if (user) { authLink.innerHTML = '👤 ' + (user.displayName || 'Профиль'); authLink.href = 'profile.html'; }
            else { authLink.innerHTML = 'Вход'; authLink.href = 'auth.html'; }
        });
    </script>
</body>
