<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f5f0;
            color: #2c2c2c;
            line-height: 1.6;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        .animate {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Шапка */
        header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            max-width: 400px;
        }

        .search-bar input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
        }

        .search-bar button {
            background: #f39c12;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-bar button:hover {
            background: #e67e22;
            transform: scale(1.02);
        }

        /* Навигация */
        nav {
            background: #2c3e50;
            padding: 0.8rem 0;
            position: sticky;
            top: 70px;
            z-index: 999;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #e74c3c;
        }

        /* Основной контент */
        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Приветственный блок */
        .hero {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 30px;
            padding: 3rem;
            margin-bottom: 2rem;
            color: white;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }

        /* Сетка рецептов */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .recipe-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .recipe-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1;
        }

        .recipe-fav {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.9);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
            z-index: 1;
        }

        .recipe-fav:hover {
            transform: scale(1.1);
        }

        .recipe-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #ddd;
        }

        .recipe-info {
            padding: 1.5rem;
        }

        .recipe-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #e74c3c;
        }

        .recipe-meta {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .recipe-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .recipe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .tag {
            background: #ecf0f1;
            padding: 0.2rem 0.7rem;
            border-radius: 15px;
            font-size: 0.75rem;
            color: #2c3e50;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            border-radius: 30px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        .modal-header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 2rem;
            border-radius: 30px 30px 0 0;
        }

        .modal-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            cursor: pointer;
            color: white;
            background: rgba(0,0,0,0.3);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.5);
        }

        .modal-body {
            padding: 2rem;
        }

        .nutrition {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 15px;
            margin: 1rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .nutrition-item {
            text-align: center;
        }

        .nutrition-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e74c3c;
        }

        .timer-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            margin: 0.5rem 0;
            transition: 0.3s;
        }

        .timer-btn:hover {
            background: #2ecc71;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 1rem;
        }

        /* Избранное */
        .favorites-section {
            margin: 2rem 0;
            padding: 1.5rem;
            background: white;
            border-radius: 20px;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #7f8c8d;
        }

        /* Подвал */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }
            .search-bar {
                max-width: 100%;
            }
            .hero h2 {
                font-size: 1.8rem;
            }
            .modal-content {
                margin: 1rem;
                width: calc(100% - 2rem);
            }
            .modal-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        if (index === -1) {
            favorites.push(id);
        } else {
            favorites.splice(index, 1);
        }
        saveFavorites();
        renderRecipes();
        updateStats();
    }

    function isFavorite(id) {
        return favorites.includes(id);
    }

    // Обновление статистики
    function updateStats() {
        document.getElementById('recipeCount').innerText = recipes.length;
        document.getElementById('favCount').innerText = favorites.length;
    }

    // Поиск
    function searchRecipes() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        renderRecipes();
    }

    // Фильтрация
    function filterCategory(category) {
        currentFilter = category;
        currentSearch = '';
        document.getElementById('searchInput').value = '';
        
        // Обновить активную кнопку
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        renderRecipes();
    }

    function showFavorites() {
        currentFilter = 'favorites';
        currentSearch = '';
        document.getElementById('searchInput').value = '';
        renderRecipes();
    }

    // Рендер рецептов
    function renderRecipes() {
        let filtered = [...recipes];
        
        if (currentFilter !== 'all' && currentFilter !== 'favorites') {
            filtered = filtered.filter(r => r.category === currentFilter);
        } else if (currentFilter === 'favorites') {
            filtered = filtered.filter(r => favorites.includes(r.id));
        }
        
        if (currentSearch) {
            filtered = filtered.filter(r => 
                r.name.toLowerCase().includes(currentSearch) || 
                r.tags.some(tag => tag.includes(currentSearch))
            );
        }
        
        const container = document.getElementById('recipesContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">😕 Ничего не найдено. Попробуйте изменить поиск или категорию</div>';
            return;
        }
        
        container.innerHTML = filtered.map(recipe => `
            <div class="recipe-card" onclick="openModal(${recipe.id})">
                <div class="recipe-badge">${getDifficultyIcon(recipe.difficulty)} ${recipe.difficulty}</div>
                <div class="recipe-fav" onclick="event.stopPropagation(); toggleFavorite(${recipe.id})">
                    ${isFavorite(recipe.id) ? '❤️' : '🤍'}
                </div>
                <div class="recipe-img" style="background-image: url('https://via.placeholder.com/400x200/${getColorByCategory(recipe.category)}/white?text=${encodeURIComponent(recipe.name)}')"></div>
                <div class="recipe-info">
                    <h3>${recipe.name}</h3>
                    <div class="recipe-meta">
                        <span>⏱️ ${recipe.time} мин</span>
                        <span>🔥 ${recipe.calories} ккал</span>
                    </div>
                    <div class="recipe-tags">
                        ${recipe.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getDifficultyIcon(diff) {
        if (diff === 'Лёгкий') return '🟢';
        if (diff === 'Средний') return '🟡';
        return '🔴';
    }

    function getColorByCategory(cat) {
        const colors = {
            breakfast: 'FFD93D',
            soup: '6BCB77',
            main: '4D96FF',
            dessert: 'FF6B9D',
            salad: 'A8E6CF',
            baking: 'FFB347'
        };
        return colors[cat] || 'FF6B6B';
    }

    // Открытие модального окна
    let activeTimer = null;
    let timerInterval = null;

    function openModal(id) {
        const recipe = recipes.find(r => r.id === id);
        if (!recipe) return;
        
        const modal = document.getElementById('recipeModal');
        const modalContent = document.getElementById('modalContent');
        
        modalContent.innerHTML = `
            <div class="modal-header">
                <h2>${recipe.name}</h2>
                <div class="recipe-meta">
                    <span>⏱️ ${recipe.time} минут</span>
                    <span>🔥 ${recipe.calories} ккал</span>
                    <span>${getDifficultyIcon(recipe.difficulty)} ${recipe.difficulty}</span>
                </div>
            </div>
            <div class="modal-body">
                <div class="nutrition">
                    <div class="nutrition-item"><div class="nutrition-value">${recipe.calories}</div><div>калорий</div></div>
                    <div class="nutrition-item"><div class="nutrition-value">${recipe.time}</div><div>минут</div></div>
                    <div class="nutrition-item"><div class="nutrition-value">${recipe.ingredients.length}</div><div>ингредиентов</div></div>
                </div>
                
                <h3>🛒 Ингредиенты</h3>
                <ul id="ingredientsList">
                    ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
                
                <h3>👩‍🍳 Пошаговое приготовление</h3>
                <ol id="stepsList">
                    ${recipe.steps.map((step, idx) => `<li id="step-${idx}">${step}</li>`).join('')}
                </ol>
                
                <div style="margin: 20px 0; padding: 15px; background: #f0f3f4; border-radius: 15px;">
                    <strong>⏰ Таймер для этого рецепта:</strong><br>
                    <button class="timer-btn" onclick="startTimer(${recipe.time * 60})">▶️ Запустить таймер (${recipe.time} мин)</button>
                    <button class="timer-btn" onclick="stopTimer()">⏹️ Остановить</button>
                    <span id="timerDisplay" class="timer-display"></span>
                </div>
                
                <div class="recipe-tags">
                    ${recipe.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                </div>
                
                <button style="background: ${isFavorite(recipe.id) ? '#e74c3c' : '#2c3e50'}; width: 100%; margin-top: 20px;" 
                        onclick="toggleFavorite(${recipe.id}); openModal(${recipe.id})">
                    ${isFavorite(recipe.id) ? '❤️ Убрать из избранного' : '🤍 Добавить в избранное'}
                </button>
            </div>
        `;
        
        modal.style.display = 'block';
    }

    function startTimer(seconds) {
        stopTimer();
        let remaining = seconds;
        const timerDisplay = document.getElementById('timerDisplay');
        if (!timerDisplay) return;
        
        timerDisplay.innerText = formatTime(remaining);
        
        timerInterval = setInterval(() => {
            if (remaining <= 0) {
                stopTimer();
                timerDisplay.innerText = '✅ Время вышло!';
                alert('⏰ Время приготовления истекло!');
            } else {
                remaining--;
                timerDisplay.innerText = formatTime(remaining);
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        const timerDisplay = document.getElementById('timerDisplay');
        if (timerDisplay) timerDisplay.innerText = '';
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function closeModal() {
        stopTimer();
        document.getElementById('recipeModal').style.display = 'none';
    }

    // Закрытие по клику вне окна
    window.onclick = function(e) {
        const modal = document.getElementById('recipeModal');
        if (e.target === modal) {
            closeModal();
        }
    }

    // Инициализация
    updateStats();
    renderRecipes();
</script>
</body>
</html>
