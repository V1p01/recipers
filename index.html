<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍳 Кулинарная книга | Рецепты, авторизация, профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ========== ОСНОВНЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Фоновые эффекты */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }
        .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, #ff6b6b, transparent); top: -200px; left: -200px; }
        .orb2 { width: 600px; height: 600px; background: radial-gradient(circle, #ffb347, transparent); bottom: -200px; right: -200px; }
        .orb3 { width: 400px; height: 400px; background: radial-gradient(circle, #ff6b6b, transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }

        /* ========== ШАПКА ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem 0;
        }

        .header__inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
        }

        .logo__icon {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo__text h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo__text p {
            font-size: 0.7rem;
            color: #a0a0b0;
        }

        /* Навигация по страницам */
        .page-nav {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem;
            border-radius: 50px;
        }

        .page-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #a0a0b0;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        .page-btn:hover:not(.active) {
            background: rgba(255, 107, 107, 0.15);
            color: white;
        }

        /* Кнопка входа/профиля */
        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-name {
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        /* ========== МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ ========== */
        .modal-auth {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(16px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-auth.active {
            display: flex;
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(25, 25, 35, 0.98), rgba(15, 15, 20, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .auth-card h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-family: 'Playfair Display', serif;
        }

        .auth-input {
            width: 100%;
            padding: 0.9rem 1rem;
            margin: 0.8rem 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-family: inherit;
        }

        .auth-input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .auth-submit {
            width: 100%;
            padding: 0.9rem;
            margin: 1rem 0;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-switch {
            color: #a0a0b0;
            cursor: pointer;
            margin-top: 1rem;
        }

        .auth-switch span {
            color: #ff6b6b;
        }

        .close-auth {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
            color: white;
        }

        /* ========== СТРАНИЦЫ ========== */
        .page {
            display: none;
            padding: 2rem 0;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero секция */
        .hero {
            text-align: center;
            padding: 3rem 0;
        }

        .hero__title {
            font-size: 3rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 1rem;
        }

        .hero__accent {
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero__desc {
            color: #a0a0b0;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Поиск и фильтры */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .search {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            max-width: 400px;
        }

        .search__input {
            flex: 1;
            padding: 0.7rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            font-family: inherit;
        }

        .search__input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .search__btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }

        .category-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border-color: transparent;
        }

        /* Сетка рецептов */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .recipe-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 107, 107, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .recipe-card__image {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .recipe-card__info {
            padding: 1.2rem;
        }

        .recipe-card__title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .recipe-card__meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #a0a0b0;
            margin: 0.5rem 0;
        }

        .recipe-card__fav {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* Форма добавления рецепта */
        .add-recipe-form {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-family: inherit;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .submit-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 0.9rem;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        /* Профиль */
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
        }

        /* Модальное окно рецепта */
        .modal-recipe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(16px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-recipe.active {
            display: flex;
        }

        .recipe-modal-content {
            background: linear-gradient(135deg, rgba(25, 25, 35, 0.98), rgba(15, 15, 20, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
        }

        .recipe-modal-close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0a0b0;
        }

        /* Тост */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Подвал */
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 3rem;
            color: #a0a0b0;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .header__inner { flex-direction: column; }
            .page-nav { order: 1; }
            .recipes-grid { grid-template-columns: 1fr; }
            .hero__title { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<header class="header">
    <div class="container">
        <div class="header__inner">
            <div class="logo" onclick="navigateTo('home')">
                <div class="logo__icon">🍳</div>
                <div class="logo__text">
                    <h1>Кулинарная книга</h1>
                    <p>рецепты с душой</p>
                </div>
            </div>
            <div class="page-nav">
                <button class="page-btn active" data-page="home">🏠 Главная</button>
                <button class="page-btn" data-page="favorites">⭐ Избранное</button>
                <button class="page-btn" data-page="add">➕ Добавить</button>
                <button class="page-btn" data-page="profile">👤 Профиль</button>
            </div>
            <div id="authSection">
                <button class="auth-btn" onclick="openAuthModal()">Войти</button>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <!-- Страница: Главная -->
    <div id="homePage" class="page active">
        <div class="hero">
            <h1 class="hero__title">Готовим <span class="hero__accent">с удовольствием</span></h1>
            <p class="hero__desc">Проверенные рецепты для домашней кухни с пошаговыми инструкциями</p>
        </div>
        <div class="controls">
            <div class="search">
                <input type="text" id="searchInput" class="search__input" placeholder="Поиск рецептов...">
                <button class="search__btn" onclick="searchRecipes()">🔍</button>
            </div>
            <div class="category-filters" id="categoryFilters">
                <button class="filter-chip active" data-cat="all">Все</button>
                <button class="filter-chip" data-cat="breakfast">Завтраки</button>
                <button class="filter-chip" data-cat="soup">Супы</button>
                <button class="filter-chip" data-cat="main">Основные</button>
                <button class="filter-chip" data-cat="dessert">Десерты</button>
                <button class="filter-chip" data-cat="salad">Салаты</button>
            </div>
        </div>
        <div id="recipesGrid" class="recipes-grid"></div>
    </div>

    <!-- Страница: Избранное -->
    <div id="favoritesPage" class="page">
        <h1 class="hero__title" style="font-size: 2rem;">⭐ <span class="hero__accent">Избранное</span></h1>
        <div id="favoritesGrid" class="recipes-grid"></div>
    </div>

    <!-- Страница: Добавить рецепт -->
    <div id="addPage" class="page">
        <h1 class="hero__title" style="font-size: 2rem;">➕ <span class="hero__accent">Добавить рецепт</span></h1>
        <div class="add-recipe-form">
            <div class="form-group">
                <label>Название блюда</label>
                <input type="text" id="newRecipeName" class="form-input" placeholder="Например: Паста Карбонара">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="newRecipeCategory" class="form-select">
                    <option value="breakfast">Завтрак</option>
                    <option value="soup">Суп</option>
                    <option value="main">Основное блюдо</option>
                    <option value="dessert">Десерт</option>
                    <option value="salad">Салат</option>
                </select>
            </div>
            <div class="form-group">
                <label>Время приготовления (мин)</label>
                <input type="number" id="newRecipeTime" class="form-input" placeholder="30">
            </div>
            <div class="form-group">
                <label>Калории</label>
                <input type="number" id="newRecipeCalories" class="form-input" placeholder="350">
            </div>
            <div class="form-group">
                <label>Ингредиенты (через запятую)</label>
                <textarea id="newRecipeIngredients" class="form-textarea" placeholder="яйца, мука, молоко, сахар"></textarea>
            </div>
            <div class="form-group">
                <label>Шаги приготовления (через запятую)</label>
                <textarea id="newRecipeSteps" class="form-textarea" placeholder="Взбить яйца, добавить муку, выпекать"></textarea>
            </div>
            <button class="submit-btn" onclick="addRecipe()">✨ Добавить рецепт</button>
        </div>
    </div>

    <!-- Страница: Профиль -->
    <div id="profilePage" class="page">
        <h1 class="hero__title" style="font-size: 2rem;">👤 <span class="hero__accent">Мой профиль</span></h1>
        <div id="profileContent"></div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Кулинарная книга — учебный проект | Рецепты с душой ❤️</p>
    </div>
</footer>

<!-- Модальное окно авторизации -->
<div id="authModal" class="modal-auth">
    <div class="close-auth" onclick="closeAuthModal()">✕</div>
    <div class="auth-card">
        <h2 id="authTitle">Вход</h2>
        <input type="text" id="authLogin" class="auth-input" placeholder="Логин">
        <input type="password" id="authPassword" class="auth-input" placeholder="Пароль">
        <button class="auth-submit" onclick="submitAuth()">Войти</button>
        <div class="auth-switch" onclick="toggleAuthMode()">
            Нет аккаунта? <span>Зарегистрироваться</span>
        </div>
    </div>
</div>

<!-- Модальное окно рецепта -->
<div id="recipeModal" class="modal-recipe">
    <div class="recipe-modal-content">
        <div class="recipe-modal-close" onclick="closeRecipeModal()">✕</div>
        <div id="recipeModalBody"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== БАЗА РЕЦЕПТОВ ==========
    let recipes = [
        { id: 1, name: "Классический омлет", category: "breakfast", time: 10, calories: 250, difficulty: "Лёгкий", tags: ["быстро", "завтрак"], ingredients: ["4 яйца", "100 мл молока", "соль", "перец", "сливочное масло"], steps: ["Взбить яйца с молоком", "Посолить, поперчить", "Вылить на сковороду", "Жарить под крышкой 5 минут"], imageId: 41 },
        { id: 2, name: "Овсяная каша с ягодами", category: "breakfast", time: 10, calories: 320, difficulty: "Лёгкий", tags: ["полезно", "быстро"], ingredients: ["50 г овсянки", "200 мл молока", "мёд", "ягоды"], steps: ["Довести молоко до кипения", "Добавить овсянку", "Варить 5 минут", "Добавить мёд и ягоды"], imageId: 42 },
        { id: 3, name: "Борщ", category: "soup", time: 90, calories: 210, difficulty: "Сложный", tags: ["суп", "сытный"], ingredients: ["свекла", "капуста", "картофель", "морковь", "лук", "говядина"], steps: ["Сварить бульон", "Нарезать овощи", "Пассеровать", "Соединить и варить"], imageId: 43 },
        { id: 4, name: "Паста Карбонара", category: "main", time: 25, calories: 580, difficulty: "Средний", tags: ["паста", "итальянская"], ingredients: ["спагетти", "бекон", "яйца", "пармезан", "чеснок"], steps: ["Отварить пасту", "Обжарить бекон", "Смешать яйца с сыром", "Соединить всё"], imageId: 44 },
        { id: 5, name: "Блинчики с творогом", category: "dessert", time: 40, calories: 320, difficulty: "Средний", tags: ["блины", "десерт"], ingredients: ["молоко", "яйца", "мука", "творог", "изюм"], steps: ["Замесить тесто", "Испечь блины", "Смешать творог", "Завернуть"], imageId: 45 },
        { id: 6, name: "Цезарь с курицей", category: "salad", time: 30, calories: 380, difficulty: "Средний", tags: ["салат", "популярный"], ingredients: ["курица", "салат романо", "помидоры", "пармезан", "сухарики"], steps: ["Обжарить курицу", "Нарвать салат", "Добавить помидоры", "Полить соусом"], imageId: 46 },
        { id: 7, name: "Плов с курицей", category: "main", time: 80, calories: 450, difficulty: "Средний", tags: ["плов", "восточный"], ingredients: ["курица", "рис", "морковь", "лук", "чеснок", "зира"], steps: ["Обжарить курицу", "Добавить лук и морковь", "Засыпать рис", "Томить 30 минут"], imageId: 47 },
        { id: 8, name: "Домашние котлеты", category: "main", time: 45, calories: 420, difficulty: "Средний", tags: ["мясо", "ужин"], ingredients: ["фарш", "лук", "яйцо", "батон", "сухари"], steps: ["Замочить батон", "Смешать фарш", "Сформировать котлеты", "Обжарить"], imageId: 48 },
        { id: 9, name: "Шарлотка", category: "dessert", time: 50, calories: 280, difficulty: "Лёгкий", tags: ["пирог", "яблоки"], ingredients: ["яйца", "сахар", "мука", "яблоки", "корица"], steps: ["Взбить яйца с сахаром", "Добавить муку", "Нарезать яблоки", "Выпекать"], imageId: 49 },
        { id: 10, name: "Греческий салат", category: "salad", time: 15, calories: 210, difficulty: "Лёгкий", tags: ["салат", "овощной"], ingredients: ["огурцы", "помидоры", "перец", "фета", "маслины"], steps: ["Нарезать овощи", "Добавить фету", "Заправить маслом"], imageId: 50 }
    ];

    // ========== ПОЛЬЗОВАТЕЛИ ==========
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

    // ========== СОСТОЯНИЕ ==========
    let currentCategory = 'all';
    let currentSearch = '';

    // ========== ФУНКЦИИ ==========

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Авторизация
    function openAuthModal() {
        document.getElementById('authModal').classList.add('active');
    }

    function closeAuthModal() {
        document.getElementById('authModal').classList.remove('active');
    }

    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('authTitle');
        const btn = document.querySelector('.auth-submit');
        const switchText = document.querySelector('.auth-switch');
        if (isLoginMode) {
            title.textContent = 'Вход';
            btn.textContent = 'Войти';
            switchText.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
        } else {
            title.textContent = 'Регистрация';
            btn.textContent = 'Зарегистрироваться';
            switchText.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
        }
    }

    function submitAuth() {
        const login = document.getElementById('authLogin').value.trim();
        const password = document.getElementById('authPassword').value.trim();

        if (!login || !password) {
            showToast('Заполните все поля');
            return;
        }

        if (isLoginMode) {
            const user = users.find(u => u.login === login && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateAuthUI();
                closeAuthModal();
                showToast(`Добро пожаловать, ${login}!`);
                renderAll();
            } else {
                showToast('Неверный логин или пароль');
            }
        } else {
            if (users.find(u => u.login === login)) {
                showToast('Пользователь уже существует');
                return;
            }
            const newUser = { login, password, recipes: [] };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateAuthUI();
            closeAuthModal();
            showToast(`Регистрация успешна! Добро пожаловать, ${login}!`);
            renderAll();
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateAuthUI();
        showToast('Вы вышли из аккаунта');
        renderAll();
    }

    function updateAuthUI() {
        const authSection = document.getElementById('authSection');
        if (currentUser) {
            authSection.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${currentUser.login[0].toUpperCase()}</div>
                    <span class="user-name">${currentUser.login}</span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            `;
        } else {
            authSection.innerHTML = `<button class="auth-btn" onclick="openAuthModal()">Войти</button>`;
        }
    }

    // Добавление рецепта
    function addRecipe() {
        if (!currentUser) {
            showToast('Войдите в аккаунт, чтобы добавить рецепт');
            openAuthModal();
            return;
        }

        const name = document.getElementById('newRecipeName').value.trim();
        const category = document.getElementById('newRecipeCategory').value;
        const time = parseInt(document.getElementById('newRecipeTime').value);
        const calories = parseInt(document.getElementById('newRecipeCalories').value);
        const ingredientsText = document.getElementById('newRecipeIngredients').value.trim();
        const stepsText = document.getElementById('newRecipeSteps').value.trim();

        if (!name || !ingredientsText || !stepsText) {
            showToast('Заполните все поля');
            return;
        }

        const newId = Math.max(...recipes.map(r => r.id), 0) + 1;
        const newRecipe = {
            id: newId,
            name: name,
            category: category,
            time: time || 30,
            calories: calories || 300,
            difficulty: "Средний",
            tags: ["домашний"],
            ingredients: ingredientsText.split(',').map(i => i.trim()),
            steps: stepsText.split(',').map(s => s.trim()),
            imageId: 30 + newId,
            isUserRecipe: true,
            author: currentUser.login
        };

        recipes.push(newRecipe);
        if (!currentUser.recipes) currentUser.recipes = [];
        currentUser.recipes.push(newId);
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));

        document.getElementById('newRecipeName').value = '';
        document.getElementById('newRecipeIngredients').value = '';
        document.getElementById('newRecipeSteps').value = '';

        showToast('Рецепт добавлен!');
        navigateTo('home');
        renderAll();
    }

    // Избранное
    function toggleFavorite(recipeId) {
        if (!currentUser) {
            showToast('Войдите, чтобы добавлять в избранное');
            openAuthModal();
            return;
        }
        const idx = favorites.indexOf(recipeId);
        if (idx === -1) {
            favorites.push(recipeId);
            showToast('✨ Добавлено в избранное');
        } else {
            favorites.splice(idx, 1);
            showToast('🗑️ Удалено из избранного');
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        renderAll();
    }

    function isFavorite(recipeId) {
        return favorites.includes(recipeId);
    }

    // Навигация
    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`${page}Page`).classList.add('active');
        document.querySelectorAll('.page-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.page-btn[data-page="${page}"]`).classList.add('active');
        
        if (page === 'favorites') renderFavorites();
        if (page === 'profile') renderProfile();
    }

    function renderFavorites() {
        const favRecipes = recipes.filter(r => favorites.includes(r.id));
        const container = document.getElementById('favoritesGrid');
        if (favRecipes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:3rem; color:#a0a0b0;">⭐ Нет избранных рецептов</div>';
            return;
        }
        container.innerHTML = renderRecipeCards(favRecipes);
    }

    function renderProfile() {
        if (!currentUser) {
            document.getElementById('profileContent').innerHTML = `
                <div class="profile-card">
                    <p style="margin-bottom:1rem;">Войдите, чтобы увидеть профиль</p>
                    <button class="auth-btn" onclick="openAuthModal()">Войти</button>
                </div>
            `;
            return;
        }
        const userRecipes = recipes.filter(r => r.author === currentUser.login);
        document.getElementById('profileContent').innerHTML = `
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <h3>${currentUser.login}</h3>
                <p>📝 Добавлено рецептов: ${userRecipes.length}</p>
                <p>⭐ В избранном: ${favorites.length}</p>
                <button class="logout-btn" style="margin-top:1rem;" onclick="logout()">Выйти</button>
            </div>
            <h3 style="margin-top:2rem;">Мои рецепты</h3>
            <div class="recipes-grid">
                ${userRecipes.length ? renderRecipeCards(userRecipes) : '<p style="color:#a0a0b0;">У вас пока нет своих рецептов. Добавьте первый!</p>'}
            </div>
        `;
    }

    function renderRecipeCards(recipesList) {
        return recipesList.map(recipe => `
            <div class="recipe-card" onclick="openRecipeModal(${recipe.id})">
                <div class="recipe-card__image" style="background-image: url('https://picsum.photos/id/${recipe.imageId || 30 + recipe.id}/400/250')"></div>
                <div class="recipe-card__info">
                    <h3 class="recipe-card__title">${escapeHtml(recipe.name)}</h3>
                    <div class="recipe-card__meta">
                        <span>⏱️ ${recipe.time} мин</span>
                        <span>🔥 ${recipe.calories} ккал</span>
                    </div>
                    <div class="recipe-card__fav" onclick="event.stopPropagation(); toggleFavorite(${recipe.id})">
                        ${isFavorite(recipe.id) ? '❤️ В избранном' : '🤍 В избранное'}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderAll() {
        let filtered = [...recipes];
        if (currentCategory !== 'all') {
            filtered = filtered.filter(r => r.category === currentCategory);
        }
        if (currentSearch) {
            filtered = filtered.filter(r => r.name.toLowerCase().includes(currentSearch));
        }
        document.getElementById('recipesGrid').innerHTML = renderRecipeCards(filtered);
        if (document.getElementById('favoritesPage').classList.contains('active')) renderFavorites();
        if (document.getElementById('profilePage').classList.contains('active')) renderProfile();
    }

    function searchRecipes() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        renderAll();
    }

    function filterByCategory(category) {
        currentCategory = category;
        document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
        document.querySelector(`.filter-chip[data-cat="${category}"]`).classList.add('active');
        renderAll();
    }

    function openRecipeModal(id) {
        const recipe = recipes.find(r => r.id === id);
        if (!recipe) return;
        const modal = document.getElementById('recipeModal');
        document.getElementById('recipeModalBody').innerHTML = `
            <h2 style="font-family:'Playfair Display'; margin-bottom:1rem;">${escapeHtml(recipe.name)}</h2>
            <div class="recipe-card__meta" style="margin-bottom:1rem;">
                <span>⏱️ ${recipe.time} мин</span>
                <span>🔥 ${recipe.calories} ккал</span>
                <span>${recipe.difficulty || 'Средний'}</span>
            </div>
            <img src="https://picsum.photos/id/${recipe.imageId || 30 + recipe.id}/600/300" style="width:100%; border-radius:20px; margin-bottom:1rem;">
            <h3>🛒 Ингредиенты</h3>
            <ul style="margin:0.5rem 0 1rem 1.5rem;">${recipe.ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>
            <h3>👩‍🍳 Приготовление</h3>
            <ol style="margin:0.5rem 0 1rem 1.5rem;">${recipe.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol>
            <button class="recipe-card__fav" style="background:linear-gradient(135deg,#ff6b6b,#ee5a5a); border:none; color:white; padding:0.7rem 1.5rem;" onclick="toggleFavorite(${recipe.id}); openRecipeModal(${recipe.id})">
                ${isFavorite(recipe.id) ? '❤️ Убрать из избранного' : '🤍 Добавить в избранное'}
            </button>
        `;
        modal.classList.add('active');
    }

    function closeRecipeModal() {
        document.getElementById('recipeModal').classList.remove('active');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Инициализация
    function init() {
        updateAuthUI();
        renderAll();
        
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', () => navigateTo(btn.dataset.page));
        });
        
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => filterByCategory(chip.dataset.cat));
        });
        
        window.onclick = function(e) {
            if (e.target === document.getElementById('authModal')) closeAuthModal();
            if (e.target === document.getElementById('recipeModal')) closeRecipeModal();
        };
    }

    init();
</script>
</body>
</html>
