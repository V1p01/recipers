<!DOCTYPE html>
<html>
<head>
    <title>Домашние рецепты</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fef8f0;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff6b6b;
            font-size: 3rem;
        }
        .recipes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>🍳 Домашние рецепты</h1>
<p>Нажмите на любое блюдо, чтобы увидеть рецепт</p>

<div class="recipes" id="recipes"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const recipes = [
    { name: "Омлет с сыром", ingredients: ["4 яйца", "100 мл молока", "50 г сыра", "соль, перец"], steps: ["Взбить яйца с молоком", "Добавить сыр", "Жарить 5-7 минут"] },
    { name: "Овсяная каша", ingredients: ["50 г овсянки", "200 мл молока", "мед", "ягоды"], steps: ["Сварить кашу", "Добавить мед и ягоды"] },
    { name: "Борщ", ingredients: ["свекла 2 шт", "капуста 300 г", "картофель 4 шт", "морковь 1 шт", "говядина 500 г"], steps: ["Сварить бульон", "Добавить овощи", "Варить 20 минут"] },
    { name: "Паста Карбонара", ingredients: ["спагетти 300 г", "бекон 150 г", "3 яйца", "пармезан 100 г"], steps: ["Отварить пасту", "Обжарить бекон", "Смешать с яйцами и сыром"] },
    { name: "Плов с курицей", ingredients: ["курица 600 г", "рис 2 стакана", "морковь 2 шт", "лук 2 шт"], steps: ["Обжарить курицу", "Добавить лук и морковь", "Засыпать рис и тушить"] },
    { name: "Блинчики с творогом", ingredients: ["молоко 500 мл", "2 яйца", "мука 200 г", "творог 300 г"], steps: ["Замесить тесто", "Испечь блины", "Завернуть творог"] }
];

const container = document.getElementById('recipes');
container.innerHTML = recipes.map((r, i) => `
    <div class="card" onclick="openRecipe(${i})">
        <h3>${r.name}</h3>
        <p>${r.ingredients.slice(0,2).join(', ')}...</p>
    </div>
`).join('');

function openRecipe(i) {
    const r = recipes[i];
    document.getElementById('modalBody').innerHTML = `
        <h2>${r.name}</h2>
        <h3>Ингредиенты:</h3>
        <ul>${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
        <h3>Приготовление:</h3>
        <ol>${r.steps.map(step => `<li>${step}</li>`).join('')}</ol>
        <button onclick="closeModal()">Закрыть</button>
    `;
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

window.onclick = function(e) {
    if (e.target === document.getElementById('modal')) closeModal();
}
</script>

</body>
</html>
